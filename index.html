<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊羊家族高二回顧系統🌟</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        
        /* 這裡恢復原本的黑藍色漸層背景，不放照片 */
        body { 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.96); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 420px; 
            transition: 0.5s; 
            text-align: center; 
        }
        
        #main-content.card { max-width: 750px; }
        
        .brand-header h2 { margin: 0 0 20px 0; color: #203a43; letter-spacing: 2px; text-align: center; }
        
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; text-align: center; margin-bottom: 15px; outline: none; }
        
        button { width: 100%; padding: 12px; background: #203a43; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2c5364; }
        
        .error-message { color: #ff4d4f; font-size: 14px; margin-top: 15px; font-weight: bold; text-align: center; }
        
        .hidden { display: none !important; }
        
        .letter-section { background: #fdfbf7; padding: 25px; border-left: 5px solid #e6b422; text-align: left; line-height: 2; color: #333; margin-bottom: 25px; font-size: 18px; }
        
        .award-section h3 { margin: 20px 0; color: #cd9b1d; }
        .award-section img { width: 100%; max-width: 650px; border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); margin-top: 15px; }
        
        .fade-in { opacity: 0; transform: translateY(15px); animation: fadeInEffect 1.2s forwards; margin-bottom: 15px; }
        .delay-1 { animation-delay: 1.2s; }
        .delay-2 { animation-delay: 2.4s; }
        .delay-3 { animation-delay: 3.6s; }
        .delay-4 { animation-delay: 5.0s; }
        @keyframes fadeInEffect { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
